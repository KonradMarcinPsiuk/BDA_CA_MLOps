apiVersion: apps/v1
kind: Deployment
metadata:
  name: temp-predictor-api
  labels:
    app: temp-predictor-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temp-predictor-api
  template:
    metadata:
      labels:
        app: temp-predictor-api
    spec:
      containers:
        - name: api
          image: temp-predictor-api
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_DIR
              value: /app/models
            - name: PORT
              value: "8000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
