apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          imagePullPolicy: IfNotPresent
          # Quick tunnel: no token, no DNS config. Random *.trycloudflare.com
          # URL is printed in this pod's stdout (`kubectl logs deploy/cloudflared`).
          # The URL rotates every time the pod restarts.
          args:
            - tunnel
            - --no-autoupdate
            - --loglevel
            - info
            - --url
            - http://temp-predictor-api.default.svc.cluster.local:80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
