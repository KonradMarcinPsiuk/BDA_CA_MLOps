name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - "feature/**"
      - "fix/**"

jobs:
  lint-and-test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-train.txt
          pip install flask==3.0.3 pytest==8.3.3 ruff==0.6.9

      - name: Ruff lint
        run: ruff check src tests main.py

      - name: Pytest
        run: pytest -q

  docker-build:
    name: Build trainer & API images
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build trainer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.train
          push: false
          tags: temp-predictor-trainer:ci
          cache-from: type=gha,scope=trainer
          cache-to: type=gha,mode=max,scope=trainer

      - name: Stage placeholder model dir for API build
        run: mkdir -p models && touch models/.gitkeep

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          tags: temp-predictor-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
