name: CD

on:
  workflow_run:
    workflows: ["Train"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Optional Train workflow run id to pull the model from"
        type: string
        default: ""
  workflow_call:
    inputs:
      run_id:
        type: string
        default: ""

permissions:
  contents: write   # needs write to commit the new image tag back to main
  packages: write   # needs write to push the image to GHCR
  actions: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/temp-predictor-api

jobs:
  build-and-promote:
    name: Build, push & bump image tag
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve source run id & short sha
        id: src
        env:
          EVENT: ${{ github.event_name }}
          WR_ID: ${{ github.event.workflow_run.id }}
          WR_SHA: ${{ github.event.workflow_run.head_sha }}
          IN_RUN_ID: ${{ inputs.run_id }}
          FALLBACK_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT" = "workflow_run" ]; then
            echo "run_id=$WR_ID" >> "$GITHUB_OUTPUT"
            echo "short_sha=${WR_SHA:0:7}" >> "$GITHUB_OUTPUT"
          elif [ -n "$IN_RUN_ID" ]; then
            echo "run_id=$IN_RUN_ID" >> "$GITHUB_OUTPUT"
            echo "short_sha=${FALLBACK_SHA:0:7}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Need either a workflow_run trigger or an explicit run_id input."
            exit 1
          fi

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: model-${{ steps.src.outputs.short_sha }}
          path: models
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.src.outputs.run_id }}

      - name: Fail if no model present
        run: |
          if ! ls models/ridge.joblib >/dev/null 2>&1; then
            echo "::error::No model artifact found — run Train first."
            exit 1
          fi
          ls -la models/

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          repo_lower="${IMAGE_NAME,,}"
          echo "image=${REGISTRY}/${repo_lower}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:latest
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Install kustomize
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz" \
            | tar xz
          sudo mv kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Bump image tag in k8s/kustomization.yaml
        working-directory: k8s
        env:
          IMAGE_REF: ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha_tag }}
        run: |
          kustomize edit set image "temp-predictor-api=${IMAGE_REF}"
          echo "--- kustomization.yaml after edit ---"
          cat kustomization.yaml

      - name: Commit & push manifest change
        env:
          IMAGE_REF: ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet k8s/kustomization.yaml; then
            echo "No manifest change to commit (same image tag)."
            exit 0
          fi
          git add k8s/kustomization.yaml
          git commit -m "ci: bump api image to ${IMAGE_REF}"
          git push origin HEAD:${{ github.ref_name || 'main' }}
